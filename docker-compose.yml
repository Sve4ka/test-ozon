services:
  postgres:
    image: postgres:17.2
    profiles:
      - postgres
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${PG_NAME:-postgres}
      POSTGRES_USER: ${PG_USER:-root}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-1234}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h postgres -p 5432" ]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    profiles:
      - redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-1234}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-1234}", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD:-1234}
      - --save 60 1
      - --loglevel warning

  backend:
    build:
      dockerfile: Dockerfile
    ports:
      - "${SERVICE_PORT:-8080}:${SERVICE_PORT:-8080}"
    environment:
      # Storage
      STORAGE_TYPE: ${STORAGE_TYPE:-memory}
      CACHE_TYPE: ${CACHE_TYPE:-noop}

      # POSTGRES
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-root}
      PG_PASSWORD: ${PG_PASSWORD:-1234}
      PG_NAME: ${PG_NAME:-postgres}
      PG_MAX_POOL: ${PG_MAX_POOL:-10}
      PG_TIMEOUT: ${PG_TIMEOUT:-1s}
      PG_CONN_ATTEMPTS: ${PG_CONN_ATTEMPTS:-10}

      # Service
      SERVICE_HOST: ${SERVICE_HOST:-0.0.0.0}
      SERVICE_PORT: ${SERVICE_PORT:-8080}
      SHORT_LINK_ADDRESS: ${SHORT_LINK_ADDRESS:-http://localhost:8080/link/}

      # REDIS
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-1234}
      CACHE_TTL: ${CACHE_TTL:-24h}

    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false


